<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWP Atfal Connect | Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-area { height: calc(100vh - 180px); }
        
        /* Message Styling */
        .msg-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 8px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sent {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .received {
            background: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Login Screen -->
    <div id="login-screen" class="flex flex-col items-center justify-center h-full px-4">
        <div class="glass p-10 rounded-[32px] text-center max-w-sm w-full shadow-2xl">
            <div class="text-5xl mb-6">🚀</div>
            <h1 class="text-3xl font-bold mb-2 tracking-tight">RWP Atfal Connect</h1>
            <p class="text-slate-400 mb-8">Ready to chat with the crew?</p>
            
            <button onclick="signIn()" class="w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-200 transition-all active:scale-95">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Continue with Google
            </button>
        </div>
    </div>

    <!-- Main Chat App -->
    <div id="chat-app" class="hidden flex flex-col h-full">
        <!-- Header -->
        <header class="p-4 glass sticky top-0 z-10 flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img id="user-img" class="w-11 h-11 rounded-full border-2 border-indigo-500 shadow-lg">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-slate-900 rounded-full"></div>
                </div>
                <div>
                    <h2 id="user-name" class="font-bold text-sm"></h2>
                    <p class="text-[10px] text-indigo-400 font-semibold uppercase tracking-widest">Atfal Member</p>
                </div>
            </div>
            <button onclick="signOutUser()" class="bg-slate-800 hover:bg-red-500/20 hover:text-red-400 p-2 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </header>

        <!-- Messages Area -->
        <div id="messages" class="chat-area overflow-y-auto p-6 flex flex-col space-y-2">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-slate-950/50 backdrop-blur-md">
            <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
                <input type="text" id="msg-input" autocomplete="off" placeholder="Say something to Atfal..." 
                    class="flex-1 bg-slate-800/50 border border-slate-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-indigo-500 transition-all text-white">
                
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl shadow-lg shadow-indigo-500/20 transition-all active:scale-90">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round text-white"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tumhari Provided Config
        const firebaseConfig = {
            apiKey: "AIzaSyDote5FMt2LXfDZNsF9VyTU0rtMSrKXC4U",
            authDomain: "rwp-atfal-connect.firebaseapp.com",
            projectId: "rwp-atfal-connect",
            storageBucket: "rwp-atfal-connect.firebasestorage.app",
            messagingSenderId: "215469253347",
            appId: "1:215469253347:web:8f078c23e1b7a2a1de5bd6",
            measurementId: "G-6NYE9BQFSG"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('login-screen');
        const chatApp = document.getElementById('chat-app');
        const messagesDiv = document.getElementById('messages');
        const chatForm = document.getElementById('chat-form');

        // --- Functions ---
        window.signIn = () => {
            signInWithPopup(auth, provider).catch(err => alert("Error: " + err.message));
        };

        window.signOutUser = () => {
            if(confirm("Logout karna chahte ho bro?")) signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('hidden');
                chatApp.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
                loadMessages();
            } else {
                loginScreen.classList.remove('hidden');
                chatApp.classList.add('hidden');
            }
        });

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            
            if(!text) return;

            try {
                await addDoc(collection(db, "chats"), {
                    text: text,
                    name: auth.currentUser.displayName,
                    uid: auth.currentUser.uid,
                    photo: auth.currentUser.photoURL,
                    timestamp: serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        };

        function loadMessages() {
            const q = query(collection(db, "chats"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isMe = data.uid === auth.currentUser.uid;
                    
                    const div = document.createElement('div');
                    div.className = `msg-bubble ${isMe ? 'sent' : 'received'}`;
                    div.innerHTML = `
                        ${!isMe ? `<p class="text-[10px] font-bold text-indigo-400 mb-1">${data.name}</p>` : ''}
                        <p class="text-sm leading-relaxed">${data.text}</p>
                    `;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
